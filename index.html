<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Slim Pro - Restaurada</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(45deg, #0f0c29, #302b63, #24243e);
            --calc-bg: #121212;
            --btn-num: #2d2d2d;
            --btn-op: #3d4552;
            --accent: #00d2ff;
            --screen-border: #333;
        }

        body.theme-purple { --accent: #a855f7; }
        body.theme-green { --accent: #22c55e; }
        body.theme-orange { --accent: #f97316; }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: var(--bg-gradient);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .calculator {
            width: 95%;
            max-width: 350px;
            background: var(--calc-bg);
            border-radius: 30px;
            padding: 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
            position: relative;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 10px;
        }

        .history-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 5px;
            flex-shrink: 0;
        }

        .history-btn svg { width: 22px; height: 22px; fill: #ccc; }

        .clock-display {
            background: #000;
            border: 1px solid var(--screen-border);
            border-radius: 12px;
            padding: 6px 10px;
            text-align: center;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 48px;
        }

        #clock-date { 
            color: #888; 
            font-size: 0.6rem; 
            text-transform: uppercase; 
            display: block; 
            margin-bottom: 2px;
            letter-spacing: 0.2px;
            white-space: nowrap;
        }
        #clock-time { 
            color: var(--accent); 
            font-size: 1rem; 
            font-weight: bold; 
            font-variant-numeric: tabular-nums; 
        }

        .menu-dots {
            color: #ccc;
            font-size: 1.4rem;
            cursor: pointer;
            padding: 0 5px;
            position: relative;
            flex-shrink: 0;
        }

        .menu-dropdown {
            display: none;
            position: absolute;
            right: 0;
            top: 35px;
            background: #222;
            border: 1px solid #444;
            border-radius: 8px;
            z-index: 100;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .menu-dropdown button {
            width: 100%;
            padding: 10px 15px;
            background: none;
            border: none;
            color: white;
            font-size: 0.8rem;
            cursor: pointer;
            white-space: nowrap;
        }

        .main-screen {
            background: #000;
            border: 2px solid var(--screen-border);
            border-radius: 18px;
            padding: 15px;
            margin-bottom: 15px;
            min-height: 110px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        .expression { color: white; font-size: 2rem; text-align: right; word-wrap: break-word; overflow: hidden; min-height: 2.4rem;}
        .preview { color: #666; font-size: 1.2rem; text-align: right; min-height: 1.5rem; margin-top: 5px;}

        .theme-selector { display: flex; justify-content: center; gap: 12px; margin-bottom: 15px; }
        .dot { width: 20px; height: 20px; border-radius: 50%; cursor: pointer; border: 2px solid rgba(255,255,255,0.1); }

        .buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        
        .btn {
            aspect-ratio: 1/1;
            border-radius: 50%;
            border: none;
            font-size: 1.4rem;
            background: var(--btn-num);
            color: white;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.1s;
        }

        .btn:active { transform: scale(0.9); filter: brightness(1.3); }
        .btn-op { background: var(--btn-op); color: var(--accent); }
        .btn-equal { background: var(--accent); color: #000; font-weight: bold; }
        .btn-ac { color: #ff6b6b; }

        .history-panel {
            position: absolute; bottom: -100%; left: 0; width: 100%; height: 75%;
            background: #111; border-radius: 30px 30px 0 0; padding: 20px;
            transition: bottom 0.4s ease; z-index: 50; border-top: 2px solid var(--accent);
        }
        .history-panel.active { bottom: 0; }
        .history-list { height: 90%; overflow-y: auto; color: white; }
        .history-item { padding: 12px 0; border-bottom: 1px solid #333; text-align: right; cursor: pointer; }
    </style>
</head>
<body onclick="closeDropdown()">

<div class="calculator" onclick="event.stopPropagation()">
    <div class="top-bar">
        <button class="history-btn" onclick="toggleHistory()">
            <svg viewBox="0 0 24 24"><path d="M13,3A9,9 0 0,0 4,12H1L4.89,15.89L4.96,16.03L9,12H6A7,7 0 0,1 13,5A7,7 0 0,1 20,12A7,7 0 0,1 13,19C11.07,19 9.32,18.21 8.06,16.94L6.64,18.36C8.27,20 10.5,21 13,21A9,9 0 0,0 22,12A9,9 0 0,0 13,3M12,8V13L16.28,15.54L17,14.33L13.5,12.25V8H12Z"/></svg>
        </button>
        
        <div class="clock-display">
            <span id="clock-date">CARREGANDO...</span>
            <span id="clock-time">00:00:00</span>
        </div>

        <div class="menu-dots" onclick="toggleDropdown(event)">
            ⋮
            <div class="menu-dropdown" id="menuDropdown">
                <button onclick="clearHistory(event)">Limpar Histórico</button>
            </div>
        </div>
    </div>
    
    <div class="theme-selector">
        <div class="dot" style="background: #00d2ff;" onclick="setTheme('')"></div>
        <div class="dot" style="background: #a855f7;" onclick="setTheme('theme-purple')"></div>
        <div class="dot" style="background: #22c55e;" onclick="setTheme('theme-green')"></div>
        <div class="dot" style="background: #f97316;" onclick="setTheme('theme-orange')"></div>
    </div>

    <div class="main-screen">
        <div class="expression" id="expression">0</div>
        <div class="preview" id="preview"></div>
    </div>

    <div class="buttons">
        <button class="btn btn-op btn-ac" onclick="clearDisplay()">AC</button>
        <button class="btn btn-op" onclick="insert('()')">( )</button>
        <button class="btn btn-op" onclick="insert('%')">%</button>
        <button class="btn btn-op" onclick="insert('/')">÷</button>

        <button class="btn" onclick="insert('7')">7</button>
        <button class="btn" onclick="insert('8')">8</button>
        <button class="btn" onclick="insert('9')">9</button>
        <button class="btn btn-op" onclick="insert('*')">x</button>

        <button class="btn" onclick="insert('4')">4</button>
        <button class="btn" onclick="insert('5')">5</button>
        <button class="btn" onclick="insert('6')">6</button>
        <button class="btn btn-op" onclick="insert('-')">−</button>

        <button class="btn" onclick="insert('1')">1</button>
        <button class="btn" onclick="insert('2')">2</button>
        <button class="btn" onclick="insert('3')">3</button>
        <button class="btn btn-op" onclick="insert('+')">+</button>

        <button class="btn" onclick="insert('0')">0</button>
        <button class="btn" onclick="insert('.')">,</button>
        <button class="btn" onclick="backspace()">⌫</button>
        <button class="btn btn-equal" onclick="equal()">=</button>
    </div>

    <div class="history-panel" id="historyPanel">
        <div style="display:flex; justify-content: space-between; margin-bottom: 10px;">
            <span style="color:#777; font-size: 0.8rem;">HISTÓRICO</span>
            <span style="color:white; cursor:pointer;" onclick="toggleHistory()">✕</span>
        </div>
        <div class="history-list" id="historyList"></div>
    </div>
</div>

<script>
    let expression = "0";
    const expDiv = document.getElementById('expression');
    const previewDiv = document.getElementById('preview');
    const histList = document.getElementById('historyList');
    const menuDropdown = document.getElementById('menuDropdown');

    function startClock() {
        const update = () => {
            const now = new Date();
            const options = { weekday: 'long', day: '2-digit', month: '2-digit', year: 'numeric' };
            document.getElementById('clock-date').innerText = now.toLocaleDateString('pt-BR', options);
            document.getElementById('clock-time').innerText = now.toLocaleTimeString('pt-BR', { hour12: false });
        };
        setInterval(update, 1000);
        update();
    }
    startClock();

    function setTheme(t) { document.body.className = t; }
    function toggleHistory() { document.getElementById('historyPanel').classList.toggle('active'); }
    function toggleDropdown(e) { 
        e.stopPropagation(); 
        menuDropdown.style.display = (menuDropdown.style.display === 'block') ? 'none' : 'block'; 
    }
    function closeDropdown() { menuDropdown.style.display = 'none'; }
    function clearHistory(e) { if(e) e.stopPropagation(); histList.innerHTML = ""; closeDropdown(); }

    function insert(val) {
        if (expression === "0" && val !== '.') expression = "";
        if (val === '()') {
            const openP = (expression.match(/\(/g) || []).length;
            const closeP = (expression.match(/\)/g) || []).length;
            expression += (openP > closeP && !isNaN(expression.slice(-1))) ? ")" : "(";
        } else {
            expression += val;
        }
        render();
    }

    function clearDisplay() { expression = "0"; render(); }
    function backspace() { expression = expression.length > 1 ? expression.slice(0, -1) : "0"; render(); }

    function render() {
        // Exibição visual no visor
        expDiv.innerText = expression.replace(/\*/g, 'x').replace(/\//g, '÷');
        
        try {
            let checkExp = expression;
            if (checkExp.includes('%')) {
                checkExp = checkExp.replace(/(\d+)\s*([\+\-\*\/])\s*(\d+)%/g, (m, p1, op, p2) => {
                    if (op === '+' || op === '-') return `${p1}${op}(${p1}*${p2}/100)`;
                    return `${p1}${op}${p2}/100`;
                });
            }
            const res = eval(checkExp);
            // Removido o "=" conforme solicitado
            previewDiv.innerText = (res !== undefined && res !== Infinity && !isNaN(res)) ? res : "";
        } catch { previewDiv.innerText = ""; }
    }

    function equal() {
        try {
            const result = eval(expression);
            const item = document.createElement('div');
            item.className = 'history-item';
            let historyText = expression.replace(/\*/g, 'x').replace(/\//g, '÷');
            item.innerText = `${historyText} = ${result}`;
            item.onclick = () => { expression = result.toString(); render(); toggleHistory(); };
            histList.prepend(item);
            expression = result.toString();
            render();
        } catch { 
            expression = "Erro"; 
            render(); 
            setTimeout(clearDisplay, 1500);
        }
    }

    render();
</script>

</body>
</html>
