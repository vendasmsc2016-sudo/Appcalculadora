<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Slim Pro Fix</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(45deg, #0f0c29, #302b63, #24243e);
            --calc-bg: #1a1a1a;
            --btn-num: #333333;
            --btn-op: #444c5a;
            --accent: #00d2ff;
            --screen-border: #444;
        }

        body.theme-purple { --accent: #a855f7; }
        body.theme-green { --accent: #22c55e; }
        body.theme-orange { --accent: #f97316; }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: var(--bg-gradient);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .calculator {
            width: 92%;
            max-width: 340px;
            background: var(--calc-bg);
            border-radius: 30px;
            padding: 15px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .clock-screen {
            background: #000;
            border: 1px solid var(--screen-border);
            border-radius: 10px;
            padding: 4px;
            margin-bottom: 12px;
            text-align: center;
        }

        #clock {
            color: var(--accent);
            font-size: 0.9rem;
            font-weight: bold;
            letter-spacing: 3px;
        }

        /* Seletor de Cores Aumentado */
        .theme-selector {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .dot { 
            width: 24px; /* Aumentado de 12px para 24px */
            height: 24px; 
            border-radius: 50%; 
            cursor: pointer; 
            border: 2px solid #555;
            transition: transform 0.2s;
        }

        .dot:active { transform: scale(1.2); }

        .main-screen {
            background: #000;
            border: 2px solid var(--screen-border);
            border-radius: 18px;
            padding: 12px;
            margin-bottom: 15px;
            min-height: 130px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            overflow: hidden;
        }

        .expression {
            color: white;
            font-size: 2rem;
            text-align: right;
            word-wrap: break-word;
            overflow-wrap: break-word;
            max-height: 80px;
            overflow-y: auto;
            line-height: 1.1;
            scrollbar-width: none;
        }

        .expression::-webkit-scrollbar { display: none; }

        .preview {
            color: #777;
            font-size: 1.2rem;
            text-align: right;
            min-height: 1.4rem;
            margin-top: 5px;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        button {
            aspect-ratio: 1/1;
            border-radius: 50%;
            border: none;
            font-size: 1.4rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.15s;
            background: var(--btn-num);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        button:active { transform: scale(0.85); filter: brightness(1.3); }

        .btn-op { background: var(--btn-op); color: var(--accent); }
        .btn-equal { background: #f48fb1; color: #000; font-weight: bold; }
        .btn-ac { color: #ff5252; }

    </style>
</head>
<body>

<div class="calculator">
    <div class="clock-screen">
        <div id="clock">00:00:00</div>
    </div>
    
    <div class="theme-selector">
        <div class="dot" style="background: #00d2ff;" onclick="setTheme('')"></div>
        <div class="dot" style="background: #a855f7;" onclick="setTheme('theme-purple')"></div>
        <div class="dot" style="background: #22c55e;" onclick="setTheme('theme-green')"></div>
        <div class="dot" style="background: #f97316;" onclick="setTheme('theme-orange')"></div>
    </div>

    <div class="main-screen">
        <div class="expression" id="expression">0</div>
        <div class="preview" id="preview"></div>
    </div>

    <div class="buttons">
        <button class="btn-op btn-ac" onclick="clearAll()">AC</button>
        <button class="btn-op" onclick="insert('()')">( )</button>
        <button class="btn-op" onclick="insert('%')">%</button>
        <button class="btn-op" onclick="insert('/')">÷</button>

        <button onclick="insert('7')">7</button>
        <button onclick="insert('8')">8</button>
        <button onclick="insert('9')">9</button>
        <button class="btn-op" onclick="insert('*')">×</button>

        <button onclick="insert('4')">4</button>
        <button onclick="insert('5')">5</button>
        <button onclick="insert('6')">6</button>
        <button class="btn-op" onclick="insert('-')">−</button>

        <button onclick="insert('1')">1</button>
        <button onclick="insert('2')">2</button>
        <button onclick="insert('3')">3</button>
        <button class="btn-op" onclick="insert('+')">+</button>

        <button onclick="insert('0')">0</button>
        <button onclick="insert('.')">,</button>
        <button onclick="backspace()">⌫</button>
        <button class="btn-equal" onclick="equal()">=</button>
    </div>
</div>

<script>
    const expDiv = document.getElementById('expression');
    const previewDiv = document.getElementById('preview');
    let expression = "";

    function updateClock() {
        const now = new Date();
        const options = { 
            timeZone: 'America/Sao_Paulo', 
            hour: '2-digit', minute: '2-digit', second: '2-digit',
            hour12: false 
        };
        document.getElementById('clock').innerText = now.toLocaleTimeString('pt-BR', options);
    }
    setInterval(updateClock, 1000);
    updateClock();

    function setTheme(t) { document.body.className = t; }

    function insert(val) {
        if (expression === "0" && val !== '.') expression = "";
        if (val === '()') {
            const openP = (expression.match(/\(/g) || []).length;
            const closeP = (expression.match(/\)/g) || []).length;
            expression += (openP > closeP) ? ")" : "(";
        } else {
            expression += val;
        }
        render();
    }

    function clearAll() {
        expression = "0";
        render();
    }

    function backspace() {
        expression = expression.length > 1 ? expression.slice(0, -1) : "0";
        render();
    }

    // Função de tratamento de porcentagem
    function parsePercentage(str) {
        // Substitui "X + Y%" por "X + (X * Y / 100)"
        return str.replace(/(\d+\.?\d*)\s*([\+\-\*\/])\s*(\d+\.?\d*)%/g, (match, p1, op, p2) => {
            if (op === '+' || op === '-') {
                return `${p1}${op}(${p1}*${p2}/100)`;
            }
            return `${p1}${op}${p2}/100`;
        })
        // Caso seja apenas "X%", substitui por "X/100"
        .replace(/(\d+\.?\d*)%/g, '($1/100)');
    }

    function render() {
        expDiv.innerText = expression.replace(/\*/g, '×').replace(/\//g, '÷');
        
        if (expression.length > 15) expDiv.style.fontSize = "1.3rem";
        else if (expression.length > 10) expDiv.style.fontSize = "1.6rem";
        else expDiv.style.fontSize = "2rem";

        if (expression !== "0" && expression.length > 0) {
            try {
                let formatted = parsePercentage(expression);
                let res = eval(formatted);
                if (res !== undefined && res.toString() !== expression) {
                    previewDiv.innerText = Number.isInteger(res) ? res : res.toFixed(3).replace(/\.?0+$/, "");
                } else { previewDiv.innerText = ""; }
            } catch (e) { previewDiv.innerText = ""; }
        } else { previewDiv.innerText = ""; }
    }

    function equal() {
        try {
            let formatted = parsePercentage(expression);
            let res = eval(formatted);
            expression = res.toString();
            previewDiv.innerText = "";
            render();
        } catch (e) { expDiv.innerText = "Erro"; }
    }
</script>
</body>
</html>
